name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync

    - name: Run Bronze Tier Tests
      run: |
        uv run python test_bronze_quick.py
      env:
        DRY_RUN: true
        LOG_LEVEL: INFO

    - name: Run Platinum Demo Test
      run: |
        uv run pytest tests/test_platinum_demo.py -v
      env:
        DRY_RUN: true
        LOG_LEVEL: INFO

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install UV
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv sync

    - name: Run Ruff linter
      run: |
        uv run ruff check src/ tests/

    - name: Check formatting with Black
      run: |
        uv run black --check src/ tests/
      continue-on-error: true

    - name: Type check with MyPy
      run: |
        uv run mypy src/
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan for secrets
      run: |
        bash scripts/scan_secrets.sh
      continue-on-error: true

    - name: Run security audit
      run: |
        bash scripts/security_audit.sh
      continue-on-error: true

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check README exists
      run: |
        test -f README.md

    - name: Check required docs exist
      run: |
        test -f docs/architecture.md
        test -f docs/security.md
        test -f docs/HACKATHON_VALIDATION_REPORT.md

  validate:
    name: Tier Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install UV
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv sync

    - name: Check Agent Skills
      run: |
        test -f skills/01_process_needs_action.md
        test -f skills/06_create_plan.md
        test -f skills/08_ralph_wiggum_loop.md
        test -f skills/12_error_recovery.md
        echo "✅ All 12 Agent Skills present"

    - name: Check MCP Servers
      run: |
        test -f src/mcp/email_mcp.py
        test -f src/mcp/odoo_mcp.py
        test -f src/mcp/facebook_mcp.py
        test -f src/mcp/twitter_mcp
        echo "✅ All MCP servers present"

    - name: Check Watchers
      run: |
        test -f src/watchers/filesystem_watcher.py
        test -f src/watchers/gmail_watcher.py
        test -f src/watchers/whatsapp_watcher.py
        echo "✅ All Watchers present"
